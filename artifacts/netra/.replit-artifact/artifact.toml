kind = "web"
previewPath = "/"
title = "NETRA — Citizen Safety Platform"
version = "1.0.0"
id = "artifacts/netra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18289

[services.development]
run = "pnpm --filter @workspace/netra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/netra", "run", "build" ]
publicDir = "artifacts/netra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18289"
BASE_PATH = "/"
